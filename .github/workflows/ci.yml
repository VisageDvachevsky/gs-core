name: CI

on:
  push:
  pull_request:

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: server/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install fastapi "uvicorn[standard]" httpx pytest pytest-asyncio ruff mypy

      - name: Run linters
        run: |
          python -m ruff check .
          python -m mypy main.py

      - name: Run tests
        run: python -m pytest tests/
